<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        .main-container {
            position: relative;
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .background-image {
            position: relative;
            width: 100%;
        }
        .background-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }
        .slider-overlay {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            z-index: 10;
        }
        .slider-container {
            position: relative;
            width: 100%;
            height: 54px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 27px;
            overflow: hidden;
            border: 2px solid #01615F;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0px;
            background-color: rgba(1, 97, 95, 0.2);
            border-radius: 27px;
        }
        .slider-thumb {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 46px;
            height: 46px;
            background-color: #01615F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
        }
