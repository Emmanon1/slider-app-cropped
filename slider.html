<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Slider App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .slider-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .slider-container img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .slider-container img.active {
            opacity: 1;
            z-index: 1;
        }
        .slider-container img.hidden {
            opacity: 0;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="slider-container">
        <img src="Image 1.jpeg" class="active" alt="Slide 1">
        <img src="Image 2.jpeg" class="hidden" alt="Slide 2">
    </div>
    <script>
        const images = document.querySelectorAll('.slider-container img');
        let current = 0;
        function nextSlide() {
            images[current].classList.remove('active');
            images[current].classList.add('hidden');
            current = (current + 1) % images.length;
            images[current].classList.remove('hidden');
            images[current].classList.add('active');
        }
        setInterval(nextSlide, 4000);
        document.querySelector('.slider-container').addEventListener('click', nextSlide);
    </script>
</body>
</html>
