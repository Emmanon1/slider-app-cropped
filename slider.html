<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider Validation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a2e; overflow:hidden; }
.background-photo { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
.background-photo img { width:100%; height:100%; object-fit:contain; }
.slider-inset { position:relative; z-index:10; width:300px; height:300px; border-radius:16px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); cursor:ew-resize; user-select:none; -webkit-user-select:none; border:3px solid rgba(255,255,255,0.3); }
.slider-inset img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
.img-after { position:absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; }
.img-after img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
.slider-line { position:absolute; top:0; left:50%; width:3px; height:100%; background:#fff; transform:translateX(-50%); pointer-events:none; z-index:20; }
.slider-handle { position:absolute; top:50%; left:50%; width:36px; height:36px; background:#fff; border-radius:50%; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; font-weight:bold; color:#1a1a2e; box-shadow:0 2px 8px rgba(0,0,0,0.4); pointer-events:none; z-index:21; font-size:14px; }
.status { position:relative; z-index:10; color:#fff; margin-top:16px; font-size:15px; padding:8px 16px; border-radius:8px; background:rgba(0,0,0,0.4); transition:all 0.3s; }
.status.validated { background:#4CAF50; font-weight:bold; }
</style>
</head>
<body>
<div class="background-photo">
  <img src="WhatsApp Image 2026-05-19 at 13.30.24 (1).jpeg" alt="Background">
</div>
<div class="slider-inset" id="slider">
  <img src="WhatsApp Image 2026-05-19 at 13.30.24 (1).jpeg" alt="Photo 1">
  <div class="img-after" id="imgAfter">
    <img src="WhatsApp Image 2026-05-19 at 13.30.24.jpeg" alt="Photo 2">
  </div>
  <div class="slider-line" id="sliderLine"></div>
  <div class="slider-handle" id="sliderHandle">&#8596;</div>
</div>
<div class="status" id="status">Glissez vers la droite pour valider</div>
<script>
var slider=document.getElementById("slider");
var imgAfter=document.getElementById("imgAfter");
var sliderLine=document.getElementById("sliderLine");
var sliderHandle=document.getElementById("sliderHandle");
var status=document.getElementById("status");
var isDown=false;
function updateSlider(x){
  var rect=slider.getBoundingClientRect();
  var pos=(x-rect.left)/rect.width;
  pos=Math.max(0,Math.min(1,pos));
  var percent=pos*100;
  imgAfter.style.clipPath="inset(0 0 0 "+percent+"%)";
  sliderLine.style.left=percent+"%";
  sliderHandle.style.left=percent+"%";
  if(percent>=90){status.textContent="Valide !";status.classList.add("validated");}
  else{status.textContent="Glissez vers la droite pour valider";status.classList.remove("validated");}
}
imgAfter.style.clipPath="inset(0 0 0 0%)";
sliderLine.style.left="0%";
sliderHandle.style.left="0%";
slider.addEventListener("mousedown",function(e){isDown=true;updateSlider(e.clientX);});
document.addEventListener("mousemove",function(e){if(!isDown)return;updateSlider(e.clientX);});
document.addEventListener("mouseup",function(){isDown=false;});
slider.addEventListener("touchstart",function(e){isDown=true;updateSlider(e.touches[0].clientX);});
document.addEventListener("touchmove",function(e){if(!isDown)return;updateSlider(e.touches[0].clientX);});
document.addEventListener("touchend",function(){isDown=false;});
</script>
</body>
</html>
